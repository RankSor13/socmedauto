name: Love Stories Facebook REEL (Boiling Waters Style)

on:
  workflow_dispatch:       # Trigger manually from GitHub Actions tab
  # Uncomment to post on a schedule (times are UTC):
  # schedule:
  #   - cron: '0 1 * * *'   # 9:00 AM Manila (UTC+8)
  #   - cron: '0 9 * * *'   # 5:00 PM Manila (UTC+8)

jobs:
  post-love-reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required for GITHUB_TOKEN to create/delete releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow "moviepy<2" numpy

      - name: Run Love Stories Facebook Reel Poster
        env:
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:   ${{ secrets.FB_ACCESS_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          PIXABAY_API_KEY:   ${{ secrets.PIXABAY_API_KEY }}
          PAGE_NAME:         ${{ secrets.PAGE_NAME }}
          COMMUNITY_NAME:    ${{ secrets.COMMUNITY_NAME }}
          GH_RELEASE_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
        run: python post_love_stories_reel.py
